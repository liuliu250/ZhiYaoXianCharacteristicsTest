<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>制药阁人格测试 - 题目列表</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      flex-direction: column;
      align-items: center; /* 水平居中 */
      padding-top: 0;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .container {
      width: 80%;
      max-width: 600px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center; /* 内容居中 */
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h2 {
      margin: 0 0 10px 0;
      color: #34495e;
    }

    .info {
      color: #7f8c8d;
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    .desc {
      color: #95a5a6;
      font-style: italic;
    }

    /* 导航栏外层：实现背景颜色和阴影 */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      margin-bottom: 20px;
    }

    /* 导航栏内层：控制内容对齐和最大宽度 */
    .nav-content {
      max-width: 800px; /* 建议与 container 保持一致 */
      margin: 0 auto;   /* 居中 */
      display: flex;
      justify-content: space-between; /* 重点：标题在左，按钮在右 */
      align-items: center;            /* 垂直方向居中 */
      padding: 15px 20px;
    }

    .page-title {
      margin: 0;
      font-size: 1.5rem;
      color: #2c3e50;
      border-left: 5px solid #3498db; /* 加个成电蓝的小边边，更有设计感 */
      padding-left: 15px;
    }

    /* 题目列表容器 */
    .container {
      width: 90%;
      max-width: 800px;
      margin: 0 auto;
    }

    /* 导航栏内层：确保按钮组垂直居中 */
    .nav-content {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px; /* 两个按钮之间的间距 */
    }

    /* 基础按钮样式（原 add-button 逻辑） */
    .nav-btn {
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      display: inline-block;
    }

    /* 创建按钮：蓝色 */
    .btn-primary {
      background-color: #3498db;
      color: white;
    }

    .btn-primary:hover {
      background-color: #2980b9;
      transform: translateY(-2px);
    }

    /* 返回按钮：深灰色或青色（保持同等视觉量级） */
    .btn-secondary {
      background-color: #95a5a6;
      color: white;
    }

    .btn-secondary:hover {
      background-color: #7f8c8d;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
<div class="top-nav">
  <div class="nav-content">
    <h1 class="page-title">题目列表</h1>
    <span style="font-size: 0.75rem; color: #95a5a6; margin-left: 15px; margin-top: 5px;">
      权重参考：[ <span th:each="dim, iter : ${dimensions}" th:text="${iter.count + '.' + dim.name + (iter.last ? '' : ' | ')}"></span> ]
    </span>
    <div class="nav-buttons">
      <a href="/quests" class="nav-btn btn-secondary">返回主页</a>
      <a href="/quests/create" class="nav-btn btn-primary">+ 创建题目</a>
    </div>
  </div>
</div>
<div class="container">
  <div th:each="q : ${questsList}" class="card">
    <h2 th:text="${q.title}">题目标题</h2>
    <div class="priority-tag" style="margin: 10px 0; color: #3498db; font-weight: bold;">
      权重分配: [ <span th:text="${#strings.listJoin(q.priority, ' | ')}">0.0</span> ]
    </div>
    <div class="info">
      作者：<span th:text="${q.author}">未知</span> |
      时间：<span th:text="${#temporals.format(q.createTime, 'yyyy-MM-dd HH:mm')}">2026-04-13</span>
    </div>
    <p class="desc" th:text="${q.description}">这里是题目的简短描述信息...</p>
  </div>
</div>

</body>
</html>
