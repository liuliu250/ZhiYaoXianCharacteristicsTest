<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交新题目</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        /* 基础容器样式 */
        .stats-container, .answer-container, .dashboard, .list-container {
            width: 90%;           /* 手机端默认宽度 */
            max-width: 800px;     /* 电脑端最大宽度 */
            margin: 20px auto;    /* 居中 */
            padding: 20px;        /* 适当减小内边距 */
            box-sizing: border-box;
        }

        /* 媒体查询：针对屏幕宽度大于 768px 的设备（电脑/平板） */
        @media (min-width: 768px) {
            .stats-container, .answer-container, .dashboard {
                width: 80%;       /* 电脑端适当收窄，避免文字过长 */
                padding: 40px;    /* 增加留白感 */
            }
        }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* 防止宽度溢出 */
            font-size: 14px;
        }
        textarea { height: 100px; resize: vertical; }
        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        /* 在带有 required-label 类的标签之前添加内容 */
        .required-label::before {
            content: "* ";      /* 生成的内容 */
            color: #e74c3c;     /* 红色（也可以用 red） */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>提交新题目</h2>
    <form th:action="@{/quests/save}" method="post">
        <div class="form-group">
            <label class="required-label">题目标题</label>
            <input type="text" name="title" placeholder="请输入题目名称" required>
        </div>
        <div class="form-group">
            <label class="required-label">作者</label>
            <input type="text" name="author" placeholder="请输入你的名字" required>
        </div>
        <div class="form-group">
            <label>题目内容</label>
            <textarea name="description" placeholder="简单叙述一下具体内容..."></textarea>
        </div>
        <div class="form-group">
            <label class="required-label">权重分配 (最多5个值，范围0~1)</label>
            <div style="display: flex; gap: 8px;">
                <input type="number" step="0.01" min="-1" max="1" name="priority" placeholder="P1" required style="flex: 1; text-align: center;">
                <input type="number" step="0.01" min="-1" max="1" name="priority" placeholder="P2" required style="flex: 1; text-align: center;">
                <input type="number" step="0.01" min="-1" max="1" name="priority" placeholder="P3" required style="flex: 1; text-align: center;">
                <input type="number" step="0.01" min="-1" max="1" name="priority" placeholder="P4" required style="flex: 1; text-align: center;">
                <input type="number" step="0.01" min="-1" max="1" name="priority" placeholder="P5" required style="flex: 1; text-align: center;">
            </div>
            <small style="color: #7f8c8d; display: block; margin-top: 5px;">请输入 5 个权重分值，留空将不计入数组</small>
        </div>
        <button type="submit">立即提交</button>
    </form>
    <a href="/quests" class="back-link">返回主页</a>
</div>

</body>
</html>
