<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>问卷管理系统 - 首页</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 10px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* 按钮通用样式 */
        .nav-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 不同功能的颜色区分 */
        .btn-answer {
            background-color: #2ecc71; /* 绿色：开始答题 */
        }

        .btn-list {
            background-color: #3498db; /* 蓝色：查看列表 */
        }

        .btn-create {
            background-color: #9b59b6; /* 紫色：创建题目 */
        }

        .icon {
            margin-right: 15px;
            font-size: 1.5rem;
        }

        .desc {
            font-size: 0.9rem;
            font-weight: normal;
            display: block;
            margin-top: 5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>制药阁人格测试</h1>

    <div class="menu-container">
        <a href="/quests/answer" class="nav-card btn-answer">
            <div>
                <span class="icon">📝</span>
                开始答题
                <span class="desc">进入测试，查看你最符合的人格是谁</span>
            </div>
        </a>

        <a href="/quests/list" class="nav-card btn-list">
            <div>
                <span class="icon">📋</span>
                题目管理
                <span class="desc">查看、管理已发布的题目</span>
            </div>
        </a>

        <a href="/quests/create" class="nav-card btn-create">
            <div>
                <span class="icon">➕</span>
                新增题目
                <span class="desc">添加新问题</span>
            </div>
        </a>
    </div>
</div>

</body>
</html>
