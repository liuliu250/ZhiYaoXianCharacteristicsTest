<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>答题结算</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 40px; }
        .stats-container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .score-banner { text-align: center; padding: 20px; background: #ebf5ff; border-radius: 10px; margin-bottom: 30px; }
        .score-banner h1 { margin: 0; color: #2c3e50; font-size: 1.2rem; }
        .final-score { font-size: 3rem; color: #3498db; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #fcfcfc; color: #7f8c8d; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; color: #34495e; }

        .id-badge { background: #eee; padding: 2px 8px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; }
        .score-bar-bg { background: #eee; height: 8px; border-radius: 4px; width: 100px; display: inline-block; margin-right: 10px; }
        .score-bar-fill { background: #3498db; height: 100%; border-radius: 4px; }

        .back-btn { display: inline-block; margin-top: 30px; text-decoration: none; color: #3498db; font-weight: 500; }
        .back-btn:hover { text-decoration: underline; }

        .vector-item {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
            flex: 1;
            margin: 0 5px;
        }

        /* 容器：所有内容从左侧开始 */
        .bidirectional-bar-container {
            height: 24px;
            background-color: #f1f1f1;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #e0e0e0;
            display: flex; /* 使用 flex 确保内部块居左 */
            justify-content: flex-start;
        }

        .fill-block {
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* 数字显示在进度条的末端（右侧） */
            min-width: 2px; /* 即使是0也给一点点视觉提示 */
        }

        /* 颜色定义 */
        .fill-block.positive {
            background-color: #3498db; /* 正数：蓝色 */
        }

        .fill-block.negative {
            background-color: #e74c3c; /* 负数：红色 */
        }

        .score-text {
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 0 8px;
            white-space: nowrap; /* 防止数字换行 */
        }
    </style>
</head>
<body>

<div class="stats-container">
    <div class="score-banner">
        <h1>最终评估结果向量</h1>
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <div th:each="val, iterStat : ${finalVector}" class="vector-item">
                <div style="font-size: 0.8rem; color: #7f8c8d;" th:text="'维度 ' + ${iterStat.count}"></div>
                <div style="font-size: 1.5rem; color: #3498db; font-weight: bold;"
                     th:text="${#numbers.formatDecimal(val, 1, 4)}">0.0000</div>
            </div>
        </div>
    </div>

    <h3>答题清单明细</h3>
    <table>
        <thead>
        <tr>
            <th width="15%">题目ID</th>
            <th width="55%">题目标题</th>
            <th width="30%">您的打分 (0-100)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${details}">
            <td><span class="id-badge" th:text="${item.id}">1</span></td>
            <td><strong th:text="${item.title}">题目名称</strong></td>
            <td>
                <div class="bidirectional-bar-container">
                    <div class="fill-block"
                         th:classappend="${item.userScore >= 0} ? 'positive' : 'negative'"
                         th:style="'width:' + ${#numbers.formatDecimal(T(java.lang.Math).abs(item.userScore) * 100, 1, 0)} + '%'">
                        <span class="score-text" th:text="${#numbers.formatDecimal(item.userScore, 1, 2)}">0.00</span>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div style="text-align: center; margin-top: 30px;">
        <a href="/quests" class="back-btn">返回主控制台</a>
    </div>
</div>

</body>
</html>
